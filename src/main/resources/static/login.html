<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventHub Academy 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-brand">EventHub Academy 2026</h1>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="signup.html" class="btn-signup">Registrati</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="auth-form">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" name="email" required placeholder="user@test.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" name="password" required placeholder="password123">
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <div id="loginError" class="error-message" style="display:none;"></div>
                <p class="auth-link">Non hai un account? <a href="signup.html">Registrati qui</a></p>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 EventHub Academy. Tutti i diritti riservati.</p>
    </footer>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
